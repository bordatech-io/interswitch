name: Build and Push to Harbor

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  SERVICE_NAME: interswitch
  HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}

jobs:
  build_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Configure Maven settings (optional secret)
        if: ${{ secrets.MAVEN_SETTINGS_XML != '' }}
        shell: bash
        run: |
          mkdir -p ~/.m2
          printf '%s' '${{ secrets.MAVEN_SETTINGS_XML }}' > ~/.m2/settings.xml

      - name: Build JAR
        shell: bash
        run: mvn -B -DskipTests clean package

      - name: Generate image tag
        id: tag
        shell: bash
        run: |
          TAG="build-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image to Harbor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.image_tag }}
