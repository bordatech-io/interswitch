# Root logger
log4j.rootLogger=INFO, file, stdout

# Rolling file appender
log4j.appender.file=org.apache.log4j.RollingFileAppender
log4j.appender.file.File=${user.dir}/logs/iso.log
log4j.appender.file.Append=true
log4j.appender.file.MaxFileSize=100MB
log4j.appender.file.MaxBackupIndex=10
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} level=%p thread=%t logger=%c{1} line=%L msg=%m%n

# Stdout appender
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} level=%p thread=%t logger=%c{1} line=%L msg=%m%n

# Apache wicket logs
log4j.logger.org.apache.wicket=INFO
log4j.logger.org.apache.wicket.protocol.http.HttpSessionStore=INFO
log4j.logger.org.apache.wicket.version=INFO
log4j.logger.org.apache.wicket.RequestCycle=INFO

# Apache XMLRPC logs
log4j.logger.org.apache.xmlrpc.webserver.XmlRpcServlet=INFO
log4j.logger.org.apache.xmlrpc.client.XmlRpcClient=INFO
log4j.logger.org.apache.xmlrpc.client.XmlRpcClientConfigImpl=INFO

